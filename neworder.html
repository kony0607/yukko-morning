<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>新規注文登録</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    body{font-family:Meiryo, 'Noto Sans JP',sans-serif;background:#f6f3ea;margin:0;padding:18px;color:#1d1b16}
    .card{background:#fff;padding:16px;border-radius:12px;border:1px solid #ded7c6;max-width:860px;margin:0 auto}
    .row{margin-bottom:10px}
    .label{font-size:13px;margin-bottom:6px;color:#555}
    input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd}
    .btn{padding:10px 12px;border-radius:10px;border:0;cursor:pointer}
    .btn-primary{background:#1d6b4b;color:#fff}
    .btn-ghost{background:#fff;border:1px solid #ddd}
    .choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:12px}
    .choice{border:2px solid #ded7c6;border-radius:14px;background:#fff;padding:10px;cursor:pointer;text-align:left}
    .choice:hover{border-color:#1d6b4b}
    .choice-img{width:100%;height:160px;object-fit:cover;border-radius:12px;display:block;margin-bottom:8px;background:#f7f7f7}
    .choice-name{font-size:20px;font-weight:800}
    .choice-sub{font-size:13px;color:#666;margin-top:4px}
    .stage{display:none}
    .stage.on{display:block}
    .big-note{font-size:15px;line-height:1.7;color:#555;margin-top:6px}
    .disabled{opacity:.55;pointer-events:none}
  </style>
</head>
<body>
  <div class="card">
    <h2>新規注文を作成</h2>
    <div class="big-note">読み取った番号を確認し、画像を見ながら和食 / 洋食を選んでください。</div>
    <div class="row"><div class="label">読み取った呼び出し番号</div><input id="call" readonly /></div>
    <div class="row"><div class="label">個数</div><input id="qty" type="number" min="1" value="1" /></div>

    <div class="row"><div class="label">当日の価格</div>
      <div id="priceInfo" class="muted">読み取り後に表示されます</div>
    </div>

    <div id="stage-choice" class="stage on">
      <div class="choice-grid">
        <button class="choice" onclick="chooseBento('wa')">
          <img class="choice-img" src="%E5%92%8C%E9%A3%9F.jpg" alt="和食" onerror="this.style.display='none'" />
          <div class="choice-name">和食</div>
          <div class="choice-sub">画像を見て選べます</div>
        </button>
        <button class="choice" onclick="chooseBento('morning')">
          <img class="choice-img" src="%E6%B4%8B%E9%A3%9F.jpg" alt="洋食" onerror="this.style.display='none'" />
          <div class="choice-name">洋食</div>
          <div class="choice-sub">このあとコーヒー確認へ進みます</div>
        </button>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ghost" onclick="cancel()">キャンセル</button></div>
    </div>

    <div id="stage-coffee" class="stage">
      <div class="choice-grid">
        <button class="choice" onclick="createSelected(true)">
          <div class="choice-name">コーヒーあり</div>
          <div class="choice-sub">洋食にコーヒーを付ける</div>
        </button>
        <button class="choice" onclick="createSelected(false)">
          <div class="choice-name">コーヒーなし</div>
          <div class="choice-sub">洋食単品で作成する</div>
        </button>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ghost" onclick="backToChoice()">戻る</button></div>
    </div>

    <div id="msg" style="margin-top:12px;color:#666"></div>
  </div>

  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyCImbm2Eg_eGrChlSfEd4eJii_TCRrPl0o",
    authDomain: "yukko-morning.firebaseapp.com",
    databaseURL: "https://yukko-morning-default-rtdb.firebaseio.com",
    projectId: "yukko-morning",
    storageBucket: "yukko-morning.firebasestorage.app",
    messagingSenderId: "282456272088",
    appId: "1:282456272088:web:1f529eab40f32630927bad",
    measurementId: "G-KFK1Q7RW1V"
  };
  let firebaseApp=null,database=null,enabled=false;
  try{ firebaseApp = firebase.initializeApp(firebaseConfig); database = firebase.database(firebaseApp); enabled=true; }catch(e){ console.warn('Firebase init failed', e.message); }

  // 当日の弁当価格（index.html と合わせる）
  const BENTO_INFO = {
    wa: { label: '和食セット', price: 600 },
    morning: { label: '洋食(モーニング)', price: 500 },
    morning_set: { label: 'モーニングセット（コーヒー付）', price: 600 }
  };

  function qs(name){ const u=new URL(location.href); return u.searchParams.get(name); }
  document.getElementById('call').value = qs('call') || '';

  let selectedBento = '';
  let busy = false;

  function setBusy(state){
    busy = state;
    document.querySelectorAll('button, input, select').forEach(el => {
      if(el.id === 'call') return;
      if(el.id === 'qty') return;
      if(el.id === 'priceInfo') return;
      if(el.closest('#msg')) return;
      if(el.classList.contains('btn-ghost') || el.classList.contains('btn-primary') || el.classList.contains('choice')){
        el.disabled = state;
      }
      el.classList.toggle('disabled', state);
    });
  }

  function chooseBento(kind){
    if(busy) return;
    selectedBento = kind;
    // 価格表示
    const price = BENTO_INFO[kind] ? `¥${BENTO_INFO[kind].price}` : '¥0';
    document.getElementById('priceInfo').textContent = `${BENTO_INFO[kind].label || kind} — ${price}`;
    if(kind === 'morning'){
      document.getElementById('stage-choice').classList.remove('on');
      document.getElementById('stage-coffee').classList.add('on');
      document.getElementById('msg').textContent = '洋食を選びました。コーヒーを選択してください。';
      return;
    }
    createSelected(false);
  }

  function backToChoice(){
    if(busy) return;
    document.getElementById('stage-coffee').classList.remove('on');
    document.getElementById('stage-choice').classList.add('on');
    document.getElementById('msg').textContent = '';
  }

  async function createSelected(withCoffee){
    if(busy) return;
    setBusy(true);
    const call = document.getElementById('call').value.replace(/\D/g,'').slice(0,3) || ('SD'+String(Date.now()).slice(-5));
    const qty = Math.max(1, Number(document.getElementById('qty').value || 1));
    const locker = 'SD' + String(Date.now()).slice(-7);
    const bento = selectedBento === 'morning' && withCoffee ? 'morning_set' : (selectedBento || 'wa');
    const order = {
      lockerFull: locker,
      callCode: call,
      bento,
      quantity: qty,
      price: BENTO_INFO[bento]?.price || 0,
      rice: 0,
      served: false,
      status: 'checked-in',
      checkedInAt: new Date().toISOString(),
      createdAt: new Date().toISOString(),
      source: 'pickup-new'
    };
    if(enabled && database){
      try{ await database.ref('orders/' + locker).set(order); document.getElementById('msg').textContent = '作成しました。戻ります...'; setTimeout(()=>{ returnBack(); }, 1000); }catch(e){ document.getElementById('msg').textContent = '保存に失敗しました'; console.error(e); setBusy(false); }
    } else {
      // Firebase が無効な場合はクエリで戻す
      document.getElementById('msg').textContent = 'Firebase 未接続のため作成できません。戻ります。'; setTimeout(()=>{ returnBack(); }, 900);
    }
  }

  function returnBack(){ const from = qs('from') || 'pickup'; if(from==='pickup') location.href = 'pickup.html'; else location.href = 'index.html'; }
  function cancel(){ if(busy) return; returnBack(); }
  </script>
</body>
</html>
