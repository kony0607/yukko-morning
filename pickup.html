  function normalizeDigits(v){ return String(v||'').replace(/\D/g,''); }
  function buildCodeCandidates(raw){
    const digits = normalizeDigits(raw); if(!digits) return [];
    const s = new Set(); s.add(digits);
    if(digits.length>=5){ s.add(digits.slice(0,5)); s.add(digits.slice(-5)); }
    if(digits.length>=3){ s.add(digits.slice(-3)); if(digits.length>=5) s.add(digits.slice(1,4)); }
    return Array.from(s);
  }

  function findOrderByRaw(raw){
    const cands = buildCodeCandidates(raw);
    return ORDERS.find(o => !o.served && cands.some(c=> o.lockerFull===c || o.callCode===c));

  async function copyLocalPickupUrl(){

    try{

  function createCanvas(width, height){
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    return canvas;
  }

  function getImageLumaArray(imageData){
    const luma = new Uint8ClampedArray((imageData.data.length / 4) | 0);
    let sum = 0;
    for(let i = 0, j = 0; i < imageData.data.length; i += 4, j++){
      const r = imageData.data[i];
      const g = imageData.data[i + 1];
      const b = imageData.data[i + 2];
      const v = 0.299 * r + 0.587 * g + 0.114 * b;
      luma[j] = v;
      sum += v;
    }
    return { luma, avg: sum / Math.max(1, luma.length) };
  }

  function thresholdToCanvas(sourceCanvas, threshold, invert = false){
    const out = createCanvas(sourceCanvas.width, sourceCanvas.height);
    const ctx = out.getContext('2d');
    const src = sourceCanvas.getContext('2d').getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
    const img = ctx.createImageData(sourceCanvas.width, sourceCanvas.height);
    const { luma } = getImageLumaArray(src);
    for(let i = 0, j = 0; i < img.data.length; i += 4, j++){
      const ink = luma[j] < threshold;
      const v = invert ? (ink ? 255 : 0) : (ink ? 0 : 255);
      img.data[i] = v;
      img.data[i + 1] = v;
      img.data[i + 2] = v;
      img.data[i + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    return out;
  }

  function buildThresholdCandidates(sourceCanvas){
    const src = sourceCanvas.getContext('2d').getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
    const { avg } = getImageLumaArray(src);
    const base = Math.max(70, Math.min(190, avg));
    // 精度優先：20個の閾値候補を試す（低速だが高精度）
    return [
      Math.round(base * 0.75),
      Math.round(base * 0.80),
      Math.round(base * 0.85),
      Math.round(base * 0.90),
      Math.round(base * 0.95),
      Math.round(base * 1.00),
      Math.round(base * 1.05),
      Math.round(base * 1.10),
      Math.round(base * 1.15),
      Math.round(base * 1.20),
      Math.round(base * 1.25),
      Math.round(base * 1.30),
      Math.round(base * 1.40),
      Math.round(base * 1.50)
    ].filter(v => v >= 40 && v <= 220);
  }

  function preprocessForTesseract(sourceCanvas){
    const variants = [];
    const thresholds = buildThresholdCandidates(sourceCanvas);
    // 全ての閾値について通常と反転の両方を生成
    thresholds.forEach((threshold) => {
      variants.push(thresholdToCanvas(sourceCanvas, threshold, false));
      variants.push(thresholdToCanvas(sourceCanvas, threshold, true));
    });
    return variants;
  }

  function cropToContent(sourceCanvas){
    const ctx = sourceCanvas.getContext('2d');
    const img = ctx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
    const { luma } = getImageLumaArray(img);
    let minX = sourceCanvas.width;
    let minY = sourceCanvas.height;
    let maxX = -1;
    let maxY = -1;
    const threshold = 220;
    for(let y = 0; y < sourceCanvas.height; y++){
      for(let x = 0; x < sourceCanvas.width; x++){
        const value = luma[y * sourceCanvas.width + x];
        if(value < threshold){
          if(x < minX) minX = x;
          if(x > maxX) maxX = x;
          if(y < minY) minY = y;
          if(y > maxY) maxY = y;
        }
      }
    }
    if(maxX < minX || maxY < minY){
      return sourceCanvas;
    }
    const padX = Math.max(4, Math.floor((maxX - minX) * 0.08));
    const padY = Math.max(4, Math.floor((maxY - minY) * 0.20));
    const cropX = Math.max(0, minX - padX);
    const cropY = Math.max(0, minY - padY);
    const cropW = Math.min(sourceCanvas.width - cropX, (maxX - minX) + padX * 2 + 1);
    const cropH = Math.min(sourceCanvas.height - cropY, (maxY - minY) + padY * 2 + 1);
    const out = createCanvas(cropW, cropH);
    out.getContext('2d').drawImage(sourceCanvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
    return out;
  }

  function centerPadCanvas(sourceCanvas, size = 28, invert = false){
    const out = createCanvas(size, size);
    const ctx = out.getContext('2d');
    ctx.fillStyle = invert ? '#000' : '#fff';
    ctx.fillRect(0, 0, size, size);

    const inner = Math.min(size - 4, Math.max(1, Math.floor(size * 0.72)));
    const scale = Math.min(inner / sourceCanvas.width, inner / sourceCanvas.height);
    const drawW = Math.max(1, Math.round(sourceCanvas.width * scale));
    const drawH = Math.max(1, Math.round(sourceCanvas.height * scale));
    const offsetX = Math.floor((size - drawW) / 2);
    const offsetY = Math.floor((size - drawH) / 2);
    ctx.drawImage(sourceCanvas, offsetX, offsetY, drawW, drawH);
    return out;
  }

  function segmentDigitRegions(binaryCanvas){
    const ctx = binaryCanvas.getContext('2d');
    const img = ctx.getImageData(0, 0, binaryCanvas.width, binaryCanvas.height);
    const { luma } = getImageLumaArray(img);
    const colHasInk = new Array(binaryCanvas.width).fill(false);
    for(let x = 0; x < binaryCanvas.width; x++){
      for(let y = 0; y < binaryCanvas.height; y++){
        const value = luma[y * binaryCanvas.width + x];
        if(value < 180){
          colHasInk[x] = true;
          break;
        }
      }
    }

    const segments = [];
    let start = -1;
    for(let x = 0; x < colHasInk.length; x++){
      if(colHasInk[x] && start === -1){ start = x; }
      if((!colHasInk[x] || x === colHasInk.length - 1) && start !== -1){
        const end = colHasInk[x] && x === colHasInk.length - 1 ? x : x - 1;
        if(end >= start){ segments.push([start, end]); }
        start = -1;
      }
    }

    // 小さすぎる区間は除外し、近接区間は結合
    const merged = [];
    segments.forEach(seg => {
      if(!merged.length){ merged.push(seg); return; }
      const prev = merged[merged.length - 1];
      if(seg[0] - prev[1] <= 3){ prev[1] = seg[1]; }
      else merged.push(seg);
    });
    return merged.filter(seg => (seg[1] - seg[0] + 1) >= 4);
  }

  function createDigitCanvasFromBinary(binaryCanvas, segment){
    const [startX, endX] = segment;
    const ctx = binaryCanvas.getContext('2d');
    const img = ctx.getImageData(startX, 0, endX - startX + 1, binaryCanvas.height);
    const { luma } = getImageLumaArray(img);

    let minY = binaryCanvas.height;
    let maxY = -1;
    for(let y = 0; y < binaryCanvas.height; y++){
      for(let x = 0; x < endX - startX + 1; x++){
        if(luma[y * (endX - startX + 1) + x] < 180){
          if(y < minY) minY = y;
          if(y > maxY) maxY = y;
        }
      }
    }
    if(maxY < minY){
      return null;
    }

    const padY = Math.max(2, Math.floor((maxY - minY) * 0.15));
    const cropY = Math.max(0, minY - padY);
    const cropH = Math.min(binaryCanvas.height - cropY, (maxY - minY) + padY * 2 + 1);
    const cropCanvas = createCanvas(endX - startX + 1, cropH);
    cropCanvas.getContext('2d').drawImage(binaryCanvas, startX, cropY, endX - startX + 1, cropH, 0, 0, endX - startX + 1, cropH);
    const padded = centerPadCanvas(cropCanvas, 28, true);
    return padded;
  }

  async function loadDigitModel(){
    if(digitModelReady) return digitModelReady;
    digitModelReady = (async () => {
      if(typeof tf === 'undefined' || !tf.loadLayersModel){
        console.warn('TensorFlow.js が利用できません');
        return null;
      }
      try{
        digitModel = await tf.loadLayersModel(MNIST_MODEL_URL);
        console.log('TensorFlow.js digit model loaded');
        return digitModel;
      }catch(e){
        console.warn('TensorFlow.js digit model load failed', e);
        digitModel = null;
        return null;
      }
    })();
    return digitModelReady;
  }

  async function ensureTesseractWorker(){
    if(tesseractWorkerReady) return tesseractWorkerReady;
    tesseractWorkerReady = (async () => {
      if(!Tesseract || !Tesseract.createWorker){
        console.warn('Tesseract worker API が利用できません');
        return null;
      }
      try{
        const worker = Tesseract.createWorker({ logger: () => {} });
        await worker.load();
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        await worker.setParameters({
          tessedit_char_whitelist: '0123456789',
          tessedit_pageseg_mode: '7',
          tessedit_enable_dict_correction: '0',
          load_system_dawg: '0',
          load_freq_dawg: '0',
          classify_bln_numeric_mode: '1',
          preserve_interword_spaces: '0'
        });
        tesseractWorker = worker;
        return worker;
      }catch(e){
        console.warn('Tesseract worker init failed', e);
        tesseractWorker = null;
        return null;
      }
    })();
    return tesseractWorkerReady;
  }

  async function classifyDigitCanvas(digitCanvas){
    if(!digitModel) return null;
    return tf.tidy(() => {
      const tensor = tf.browser.fromPixels(digitCanvas, 1)
        .toFloat()
        .div(255.0)
        .reshape([1, 28, 28, 1]);
      const output = digitModel.predict(tensor);
      const probs = Array.from(output.dataSync());
      let bestIndex = 0;
      let bestProb = probs[0] || 0;
      for(let i = 1; i < probs.length; i++){
        if(probs[i] > bestProb){ bestProb = probs[i]; bestIndex = i; }
      }
      return { digit: String(bestIndex), confidence: bestProb };
    });
  }

  async function recognizeDigitsWithTfjs(binaryCanvas){
    if(!digitModel) return null;
    const segments = segmentDigitRegions(binaryCanvas);
    if(!segments.length || segments.length > 5) return null;
    const digits = [];
    let score = 0;
    for(const segment of segments){
      const digitCanvas = createDigitCanvasFromBinary(binaryCanvas, segment);
      if(!digitCanvas) return null;
      const result = await classifyDigitCanvas(digitCanvas);
      if(!result) return null;
      digits.push(result.digit);
      score += result.confidence;
    }
    const value = digits.join('');
    if(digits.length === 3){
      return { value, score: score / 3 };
    }
    return null;
  }

  function extractThreeDigits(text){
    const digits = normalizeDigits(String(text || '')
      .replace(/[oOqQD°0O]/g, '0')
      .replace(/[iIlL|!1]/g, '1')
      .replace(/[zZ2]/g, '2')
      .replace(/[sS$5]/g, '5')
      .replace(/[bB8]/g, '8')
      .replace(/[gG6]/g, '6')
      .replace(/[tT7]/g, '7')
      .replace(/[aA4]/g, '4')
      .replace(/[eE3]/g, '3')
      .replace(/[bB8]/g, '8')
      .replace(/[pP9]/g, '9'));
    if(!digits) return null;
    const direct = digits.match(/\d{3}/);
    if(direct) return direct[0];
    if(digits.length > 3){
      return digits.slice(-3);
    }
    return digits.length === 3 ? digits : null;
  }

  function rankCandidate(candidate){
    if(!candidate || !candidate.value) return -1;
    const value = normalizeDigits(candidate.value).slice(0, 3);
    if(value.length !== 3) return -1;
    const parsed = Number(value);
    if(Number.isNaN(parsed)) return -1;
    // TFJS に高い重みを付与（精度が高い傾向）
    const base = candidate.source === 'tfjs' ? 90 : (candidate.source === 'tesseract' ? 75 : 70);
    const confidence = typeof candidate.confidence === 'number' ? candidate.confidence : 0;
    return base + Math.min(30, confidence);
  }

  async function recognizeWithTesseractVariants(sourceCanvas){
    const candidates = [];
    const variants = preprocessForTesseract(sourceCanvas);
    for(let i = 0; i < variants.length; i++){
      try{
        const variant = variants[i];
        const res = await Tesseract.recognize(variant.toDataURL('image/png'), 'eng', {
          logger: () => {},
          tessedit_char_whitelist: '0123456789',
          tessedit_pageseg_mode: 7,
          user_defined_dpi: '300',
          tessedit_enable_dict_correction: '0',
          load_system_dawg: '0',
          load_freq_dawg: '0',
          classify_bln_numeric_mode: '1',
          preserve_interword_spaces: '0'
        });
        const text = res && res.data && typeof res.data.text === 'string' ? res.data.text : '';
        const candidate = extractThreeDigits(text);
        if(candidate){
          candidates.push({ value: candidate, confidence: Number(res?.data?.confidence || 0), source: 'tesseract' });
          // 信頼度が高い結果が得られたら早期確定
          if(Number(res?.data?.confidence || 0) > 80 && i >= 1) break;
        }
      }catch(e){
        console.warn('tesseract variant failed', e);
      }
    }
    return candidates;
  }

  function startScanner(){
    if(uiState !== 'scanner') return;
    const reader = document.getElementById('reader');
    const secureContext = window.isSecureContext || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if(!secureContext || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showCameraHelp('カメラ起動に失敗しました', 'ブラウザの制限で、この開き方ではカメラにアクセスできません。');
      return;
    }
    reader.innerHTML = '';
    videoEl = document.createElement('video');
    videoEl.setAttribute('playsinline', '');
    videoEl.setAttribute('autoplay', '');
    videoEl.muted = true;
    videoEl.style.width = '100%';
    videoEl.style.height = '100%';
    reader.appendChild(videoEl);

    const constraints = CAMERA_CONSTRAINTS[cameraConstraintIndex] || CAMERA_CONSTRAINTS[0];
    navigator.mediaDevices.getUserMedia(constraints).then(stream => {
      cameraStartRetryCount = 0;
      cameraConstraintIndex = 0;
      videoStream = stream;
      videoEl.srcObject = stream;
      videoEl.play().catch(()=>{});
      // OCR ループ（精度優先モード：1秒ごと）
      if(ocrIntervalId) clearInterval(ocrIntervalId);
      ocrIntervalId = setInterval(captureAndOcr, ACCURACY_MODE_INTERVAL);
    }).catch(err => {
      const name = err && err.name ? err.name : 'CameraError';
      if(cameraConstraintIndex < CAMERA_CONSTRAINTS.length - 1){
        cameraConstraintIndex += 1;
        reader.innerHTML = '<div class="muted" style="padding:12px;text-align:center;">カメラ設定を切り替えています...</div>';
        setTimeout(() => {
          if(uiState === 'scanner') startScanner();
        }, 500);
        return;
      }
      if((name === 'NotReadableError' || name === 'AbortError') && cameraStartRetryCount < 3){
        cameraStartRetryCount += 1;
        reader.innerHTML = `<div class="muted" style="padding:12px;text-align:center;">カメラを準備中です...(${cameraStartRetryCount}/3)</div>`;
        setTimeout(() => {
          if(uiState === 'scanner') startScanner();
        }, 700);
        return;
      }
      const detail = name === 'NotAllowedError'
        ? 'カメラの許可が拒否されています。ブラウザ設定で許可してください。'
        : name === 'NotFoundError'
          ? '利用できるカメラが見つかりません。端末側のカメラアプリが使用中でないか確認してください。'
          : name === 'NotReadableError'
            ? 'カメラが他のアプリで使用中の可能性があります。'
            : `詳細: ${name}`;
      showCameraHelp('カメラ起動に失敗しました', detail);
    });
  }

  function stopScanner(){
    if(ocrIntervalId){ clearInterval(ocrIntervalId); ocrIntervalId = null; }
    if(videoEl){
      try{ videoEl.pause(); }catch(e){}
      try{ videoEl.srcObject = null; }catch(e){}
    }
    if(videoStream){
      videoStream.getTracks().forEach(t=>t.stop());
      videoStream = null;
    }
    const reader = document.getElementById('reader'); if(reader) reader.innerHTML = 'カメラを停止しました';
    html5QrCode = null;
    ocrRunning = false;
  }
  function restartScanner(){
    hideOverlay();
    setUiState('scanner');
    stopScanner();
    ocrRunning = false;
    cameraStartRetryCount = 0;
    setTimeout(() => {
      if(uiState === 'scanner') startScanner();
    }, 350);
  }

  async function recognizeFastThreeDigits(sourceCanvas){
    // 精度モード：複数の前処理バリエーションで、最も高い信頼度を持つ結果を返す
    const candidates = [];
    const variants = preprocessForTesseract(sourceCanvas);
    // 並列にではなく、順序をつけてOCRを実行し、高い信頼度が得られたら早期終了
    for(let i = 0; i < Math.min(variants.length, 8); i++){
      try{
        const worker = await ensureTesseractWorker();
        if(!worker) continue;
        const res = await worker.recognize(variants[i].toDataURL('image/png'));
        const text = res && res.data && typeof res.data.text === 'string' ? res.data.text : '';
        const candidate = extractThreeDigits(text);
        if(candidate){
          const conf = Number(res?.data?.confidence || 0);
          candidates.push({ value: candidate, source: 'tesseract-fast', confidence: conf });
          // 信頼度が高い結果が得られたら早期確定
          if(conf >= 92) break;
        }
      }catch(e){
        console.warn('fast OCR variant failed', e);
      }
    }
    if(!candidates.length) return null;
    return candidates.sort((a, b) => (b.confidence || 0) - (a.confidence || 0))[0];
  }

  async function recognizeAccurateThreeDigits(sourceCanvas){
    const candidates = [];
    const worker = await ensureTesseractWorker();
    if(worker){
      const variants = preprocessForTesseract(sourceCanvas);
      for(let i = 0; i < Math.min(variants.length, 12); i++){
        try{
          const res = await worker.recognize(variants[i].toDataURL('image/png'));
          const text = res && res.data && typeof res.data.text === 'string' ? res.data.text : '';
          const candidate = extractThreeDigits(text);
          if(candidate){
            candidates.push({ value: candidate, source: 'tesseract', confidence: Number(res?.data?.confidence || 0) });
            if(Number(res?.data?.confidence || 0) >= 95) break;
          }
        }catch(e){
          console.warn('accurate OCR failed', e);
        }
      }
    }

    // TFJS を複数の前処理で試す（高精度が必要）
    const tfjsVariants = [160, 140, 180].map(t => thresholdToCanvas(sourceCanvas, t, false));
    for(const variant of tfjsVariants){
      const tfjsCandidate = await recognizeDigitsWithTfjs(variant);
      if(tfjsCandidate){
        // TFJS の信頼度を高く評価（Tesseract より信頼性が高いことが多い）
        candidates.push({ value: tfjsCandidate.value, confidence: Math.round((tfjsCandidate.score || 0) * 100), source: 'tfjs' });
        if(tfjsCandidate.score >= 0.90) break;
      }
    }

    if(!candidates.length) return null;
    // 多数決を試す：同じ結果が複数あれば優先
    const valueCounts = {};
    candidates.forEach(c => {
      valueCounts[c.value] = (valueCounts[c.value] || 0) + 1;
    });
    const maxCount = Math.max(...Object.values(valueCounts));
    const consensusValues = Object.keys(valueCounts).filter(v => valueCounts[v] === maxCount);
    
    if(maxCount >= 2){
      // 複数の候補が同じ結果を出している場合、それを優先
      const consensusCandidate = candidates.find(c => consensusValues.includes(c.value));
      if(consensusCandidate) return { ...consensusCandidate, confidence: 99 };
    }
    
    return candidates.sort((a, b) => rankCandidate(b) - rankCandidate(a))[0];
  }

  async function captureAndOcr(){
    if(uiState !== 'scanner') return;
    if(ocrRunning) return;
    if(!videoEl || videoEl.readyState < 2) return;
    
    ocrRunning = true;
    try{
      const w = Math.min(videoEl.videoWidth || 480, 960);
      const h = Math.min(videoEl.videoHeight || 360, 540);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(videoEl, 0, 0, w, h);
      
      // 中央領域だけを使ってOCR精度を上げる
      const cropW = Math.floor(w * 0.56);
      const cropH = Math.floor(h * 0.28);
      const cropX = Math.floor((w - cropW) / 2);
      const cropY = Math.floor((h - cropH) / 2);
      const cropCanvas = document.createElement('canvas');
      cropCanvas.width = cropW;
      cropCanvas.height = cropH;
      const cctx = cropCanvas.getContext('2d');
      cctx.drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
      const contentCanvas = cropToContent(cropCanvas);
      
      // 現在のフレームをバッファに追加
      frameBuffer.push(contentCanvas);
      if(frameBuffer.length > FRAME_BUFFER_SIZE){
        frameBuffer.shift();
      }
      
      // バッファが満杯になったら、複数フレームの投票で結果を決定
      if(frameBuffer.length >= 3){
        const results = [];
        for(const frameCanvas of frameBuffer){
          const result = await recognizeFastThreeDigits(frameCanvas);
          if(result && result.value){
            results.push(result.value);
          }
        }
        
        if(results.length >= 2){
          // 投票結果の集計
          const resultCounts = {};
          results.forEach(r => {
            resultCounts[r] = (resultCounts[r] || 0) + 1;
          });
          
          const maxCount = Math.max(...Object.values(resultCounts));
          // 3フレーム中2フレーム以上が同じ結果を出しているか確認
          if(maxCount >= 2){
            const finalCode = Object.keys(resultCounts).find(v => resultCounts[v] === maxCount);
            if(finalCode){
              console.log('Multi-frame voting result:', finalCode, `(${maxCount}/${results.length} frames)`);
              frameBuffer = [];
              stopScanner();
              askConfirmNumber(finalCode, 'multi-scan');
              return;
            }
          }
        }
      }
      
      ocrRunning = false;
      return;
    }catch(e){
      console.warn('OCR error', e);
    }
    ocrRunning = false;
  }

  function askConfirmNumber(code, source = 'scan'){
    setUiState('confirm-code');
    pendingScanCode = normalizeDigits(code).slice(-3);
    pendingScanSource = source;
    showOverlay('番号の確認', `${pendingScanCode} でお間違いないですか？`, [
      { label: 'はい', primary: true, onClick: () => confirmScanYes() },
      { label: 'いいえ', primary: false, onClick: () => confirmScanNo() }
    ]);
  }

  function confirmScanYes(){
    const code = pendingScanCode;
    pendingScanCode = '';
    if(!code){ restartScanner(); return; }
    if(pendingOrder){
      confirmOrderYes();
      return;
    }
    applyConfirmedCode(code);
  }

  function confirmScanNo(){
    pendingScanCode = '';
    pendingOrder = null;
    hideOverlay();
    showManualCorrectionPrompt('');
  }

  function showManualCorrectionPrompt(initialValue){
    setUiState('manual-correction');
    hideOverlay();
    const root = document.getElementById('pickupResult');
    const safeValue = normalizeDigits(initialValue || '').slice(0,3);
    root.innerHTML = '';
    const box = document.createElement('div'); box.className = 'confirm';
    const txt = document.createElement('div'); txt.className = 'confirm-text'; txt.textContent = '読み取り内容が違っていたら、番号を入力してください。';
    const input = document.createElement('input');
    input.type = 'tel';
    input.inputMode = 'numeric';
    input.maxLength = 3;
    input.value = safeValue;
    input.style.cssText = 'width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;font-size:18px;text-align:center;box-sizing:border-box;margin-bottom:10px;';
    input.addEventListener('input', () => { input.value = input.value.replace(/\D/g,'').slice(0,3); });
    input.addEventListener('keydown', (ev) => { if(ev.key === 'Enter') confirmManualCorrection(input.value); });
    const row = document.createElement('div'); row.className = 'confirm-row';
    const ok = document.createElement('button'); ok.className = 'btn btn-primary'; ok.textContent = '入力して確認';
    const retry = document.createElement('button'); retry.className = 'btn btn-ghost'; retry.textContent = '再読み取り';
    ok.addEventListener('click', () => confirmManualCorrection(input.value));
    retry.addEventListener('click', () => restartScanner());
    row.appendChild(ok); row.appendChild(retry);
    box.appendChild(txt); box.appendChild(input); box.appendChild(row);
    root.appendChild(box);
    setTimeout(() => input.focus(), 0);
  }

  function confirmManualCorrection(value){
    const v = normalizeDigits(value).slice(0,3);
    if(!v){
      showManualCorrectionPrompt('');
      return;
    }
    pendingScanCode = '';
    processScan(v, 'manual');
  }

  async function applyConfirmedCode(code){
    await processScan(code, 'confirmed');
  }

  async function processScan(raw, source = 'scan'){
    const order = findOrderByRaw(raw);
    if(!order){
      if(source === 'manual'){
        showNewOrderPrompt(normalizeDigits(raw).slice(-3));
      } else {
        showManualCorrectionPrompt(raw);
      }
      return;
    }
    pendingOrder = order;
    showOrderConfirm(order);
  }

  function showOrderConfirm(order){
    setUiState('confirm-order');
    const status = order.served ? '提供済み' : (order.checkedInAt ? '受付済み' : '未受付');
    const label = bentoLabel(order.bento);
    showOverlay('注文内容の確認', `${order.callCode} / ${label} / 個数 ${order.quantity || 1} / 状態 ${status}\nこの内容で進めますか？`, [
      { label: 'はい', primary: true, onClick: () => confirmOrderYes() },
      { label: 'いいえ', primary: false, onClick: () => confirmOrderNo() }
    ]);
  }

  async function confirmOrderYes(){
    const order = pendingOrder;
    pendingOrder = null;
    hideOverlay();
    if(!order){ restartScanner(); return; }
    setUiState('busy');
    await handleKnownOrder(order, order.callCode, pendingScanSource || 'confirmed');
  }

  function confirmOrderNo(){
    pendingOrder = null;
    hideOverlay();
    setUiState('scanner');
    showMessage('スタッフに声をかけてください。', 'muted');
  }

  function showNewOrderPrompt(code){
    setUiState('new-order');
    const root = document.getElementById('pickupResult');
    const safeCode = normalizeDigits(code || '').slice(-3);
    root.innerHTML = '';
    showOverlay('新規注文の確認', `${safeCode || '---'} は未登録です。新規注文を作成しますか？`, [
      { label: '作成する', primary: true, onClick: () => { hideOverlay(); goNewOrder(safeCode); } },
      { label: '戻る', primary: false, onClick: () => { hideOverlay(); restartScanner(); } }
    ]);
  }

  async function handleKnownOrder(order, raw, source = 'scan'){
    const now = Date.now();
    if(order.served){ showMessage('この注文は既に提供済みです。','muted'); return; }
    const last = order.lastScanAt ? new Date(order.lastScanAt).getTime() : 0;
    if(last && (now - last) < IGNORE_WINDOW_MS){ showMessage('連続スキャンと判断しました（ミス）。しばらく待ってください。','muted'); return; }
    if(!order.checkedInAt){
      order.checkedInAt = new Date().toISOString();
      order.lastScanAt = new Date().toISOString();
      order.status = 'checked-in';
      await updateOrder(order);
      showMessage('受付完了。席に戻ってお待ちください。','big');
      return;
    }
    order.served = true; order.servedAt = new Date().toISOString(); order.lastScanAt = new Date().toISOString(); order.status = 'served';
    await updateOrder(order);
    showMessage('提供済みにしました。ありがとうございました。','big');
  }

  function showMessage(text, cls){
    setUiState('busy');
    const el = document.getElementById('pickupResult');
    el.innerHTML = `<div class="${cls}">${text}</div>`;
    setTimeout(()=>{ el.innerHTML=''; ocrRunning = false; restartScanner(); }, 2800);
  }

  function goNewOrder(code){
    const call = normalizeDigits(code).slice(-3);
    window.location.href = `neworder.html?call=${encodeURIComponent(call)}&from=pickup`;
  }


  // 手入力での確認（2回方式対応）
  function onManualConfirm(){
    const v = document.getElementById('manualInput').value.trim().replace(/\D/g,'').slice(0,3);
    if(!v) return;
    askConfirmNumber(v, 'manual');
    document.getElementById('manualInput').value = '';
  }
  async function updateOrder(order){ if(!firebaseEnabled || !database) return; try{ await database.ref('orders/' + order.firebaseKey).update({ checkedInAt: order.checkedInAt || null, lastScanAt: order.lastScanAt || null, served: !!order.served, servedAt: order.servedAt || null, status: order.status || null }); }catch(e){ console.error('Firebase update failed', e); } }

  function onFile(ev){ const f = ev.target.files && ev.target.files[0]; if(!f) return; const r = new Html5Qrcode('reader'); r.scanFile(f, true).then(decoded => { processScan(decoded); }).catch(()=>{ showMessage('写真から読み取れませんでした。明るく撮影し直してください。','muted'); }); ev.target.value=''; }

  function syncFromFirebase(){ if(!firebaseEnabled || !database) return; const ref = database.ref('orders'); ref.on('value', snap => { const data = snap.val() || {}; ORDERS.length = 0; Object.keys(data).forEach(k => { ORDERS.push({ firebaseKey: k, ...data[k] }); }); console.log('pickup synced', ORDERS.length); }); }

  if(firebaseEnabled) syncFromFirebase();
  ensureTesseractWorker();
  loadDigitModel();
  setUiState('scanner'); startScanner();
  </script>
</body>
